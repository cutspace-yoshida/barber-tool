<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BARBER管理ツール</title>

<!-- アイコン -->
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<!-- アプリっぽく -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#4facfe">

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f0f4f8;
}

.header {
  background: linear-gradient(45deg, #4facfe, #00f2fe);
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 20px;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input, textarea {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  color: white;
  font-size: 16px;
}

.save { background: #4CAF50; }
.line { background: #06C755; }
.delete { background: #ff5252; }

.record {
  background: #fff;
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  border-left: 5px solid #4facfe;
}
</style>
</head>

<body>

<div class="header">💈 BARBER管理</div>

<div class="container">

<div class="card">
  <input type="text" id="name" placeholder="お客様名">
  <input type="date" id="date">
  <textarea id="memo" placeholder="髪型・特徴など"></textarea>
  <button class="save" onclick="saveData()">保存</button>
</div>

<div class="card">
  <input type="text" id="search" placeholder="検索..." oninput="displayData()">
</div>

<div id="list"></div>

</div>

<script>
const STORAGE_KEY = "barber_customers_v1";

function saveData() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const memo = document.getElementById("memo").value;

  if (!name || !date) {
    alert("入力してください");
    return;
  }

  const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  data.push({ name, date, memo });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));

  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("memo").value = "";

  displayData();
}

function deleteData(index) {
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  data.splice(index, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  displayData();
}

function sendLINE(text) {
  const url = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
  window.open(url);
}

function displayData() {
  const keyword = document.getElementById("search").value.toLowerCase();
  let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, i) => {
    if (!item.name.toLowerCase().includes(keyword)) return;

    const text = `${item.name} / ${item.date} / ${item.memo}`;

    const div = document.createElement("div");
    div.className = "record";

    div.innerHTML = `
      <b>${item.name}</b><br>
      ${item.date}<br>
      ${item.memo}<br>
      <button class="line" onclick="sendLINE('${text}')">LINE送信</button>
      <button class="delete" onclick="deleteData(${i})">削除</button>
    `;

    list.appendChild(div);
  });
}

displayData();
</script>

</body>
</html>
